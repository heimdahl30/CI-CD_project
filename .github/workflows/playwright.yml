name: Playwright Tests

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/playwright.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/playwright.yml'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 1. Start MongoDB (Required for your Mongoose backend)
    - name: Start MongoDB
      uses: supercharge/mongodb-github-action@1.12.1
      with:
        mongodb-version: '6.0'

    # 2. Setup Node
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: |
          frontend/package-lock.json
          backend/package-lock.json

    # 3. Start Backend on port 3003
    - name: Install & Start Backend
      run: |
        npm ci
        npm start &
      working-directory: backend
      env:
        PORT: 3003
        MONGODB_URI: mongodb://localhost:27017/test_db
        NODE_ENV: test

    # 4. Install Frontend & Browsers

    - name: Install & Start Frontend
      run: |
        npm ci
        npm run dev &
      working-directory: frontend

    - name: Install Playwright dependencies
      run: npm ci
      working-directory: frontend/playwright_blogtesting

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      working-directory: frontend/playwright_blogtesting

    # 5. Run Playwright Tests
    - name: Run Playwright tests
      run: npx playwright test
      working-directory: frontend/playwright_blogtesting
      env:
        # Playwright will use Vite's default 5173
        PLAYWRIGHT_TEST_BASE_URL: http://localhost:5173

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30
