name: Playwright Tests

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/playwright.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/playwright.yml'

jobs:
  test:
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 1. Start MongoDB (Required for your Mongoose backend)
    - name: Start MongoDB
      uses: supercharge/mongodb-github-action@1.12.1
      with:
        mongodb-version: '6.0'

    # 2. Setup Node
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: |
          frontend/package-lock.json
          backend/package-lock.json
          frontend/playwright_blogtesting/package-lock.json

    - name: Debug File Path
      run: |
        echo "Current Working Directory: $(pwd)"
        echo "Listing all files in the repository:"
        ls -R

    - name: Run Backend Unit Tests
      run: |
        npm ci
        npm test
      working-directory: backend
      env:
        MONGODB_URI: mongodb://localhost:27017/test_db
        PORT: 3003
        NODE_ENV: test
        SECRET: ${{ secrets.SECRET }}

    # 4. Run Frontend Component Tests
    - name: Run Frontend Component Tests (Vitest)
      run: |
        npm ci
        npm test -- --watch=false # Ensure Vitest doesn't hang in "watch" mode
      working-directory: frontend

    # 3. Start Backend on port 3003
    - name: Install & Start Backend
      run: |
        npm ci
        node src/index.js &
        npx wait-on http://127.0.0.1:3003/api/blogs --timeout 30000
      working-directory: backend
      env:
        PORT: 3003
        MONGODB_URI: mongodb://127.0.0.1:27017/test_db
        NODE_ENV: test

    # 4. Install Frontend & Browsers

    - name: Install & Start Frontend
      run: |
        npm ci
      working-directory: frontend

    - name: Install Playwright dependencies
      run: npm ci
      working-directory: frontend/playwright_blogtesting

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      working-directory: frontend/playwright_blogtesting

    # 5. Run Playwright Tests
    - name: Run Playwright tests
      timeout-minutes: 20
      run: DEBUG=pw:api npx playwright test --reporter=list,html --timeout=120000
      working-directory: frontend/playwright_blogtesting

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: frontend/playwright_blogtesting/playwright-report/
        retention-days: 30
