name: Deployment

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    types: [opened, synchronize]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/**'

jobs:
  build_and_test:
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 1. Start MongoDB (Required for your Mongoose backend)
    - name: Start MongoDB
      uses: supercharge/mongodb-github-action@1.12.1
      with:
        mongodb-version: '6.0'

    # 2. Setup Node
    - uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: |
          frontend/package-lock.json
          backend/package-lock.json
          frontend/playwright_blogtesting/package-lock.json

    - name: Debug File Path
      run: |
        echo "Current Working Directory: $(pwd)"
        echo "Listing all files in the repository:"
        ls -R

    - name: Run Backend Unit Tests
      run: |
        npm ci
        npm run lint
        npm test
      working-directory: backend
      env:
        MONGODB_URI: mongodb://localhost:27017/test_db
        PORT: 3003
        NODE_ENV: test
        SECRET: ${{ secrets.SECRET }}

    # 4. Run Frontend Component Tests
    - name: Run Frontend Component Tests (Vitest)
      run: |
        npm install --legacy-peer-deps
        npm run lint
        npm test -- --watch=false # Ensure Vitest doesn't hang in "watch" mode
      working-directory: frontend

    - name: Build Frontend for E2E
      run: |
        npm run build
        rm -rf ../backend/dist
        mkdir -p ../backend/dist
        cp -r dist/* ../backend/dist/
      working-directory: frontend

    # 3. Start Backend on port 3003
    - name: Install & Start Backend
      run: |
        node src/index.js &
        npx wait-on http://127.0.0.1:3003/api/blogs --timeout 30000
      working-directory: backend
      env:
        PORT: 3003
        MONGODB_URI: mongodb://127.0.0.1:27017/test_db
        NODE_ENV: test
        SECRET: ${{ secrets.SECRET }}

    - name: Install Playwright dependencies
      run: |
        npm ci
        npm run lint
      working-directory: frontend/playwright_blogtesting

    - name: Install Playwright Browsers
      run: npx playwright install chromium --with-deps
      working-directory: frontend/playwright_blogtesting

    # 5. Run Playwright Tests
    - name: Run Playwright tests
      timeout-minutes: 20
      run: npx playwright test --reporter=list,html --timeout=120000
      working-directory: frontend/playwright_blogtesting
      env:
        PLAYWRIGHT_TEST_BASE_URL: http://127.0.0.1:3003

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: frontend/playwright_blogtesting/playwright-report/
        retention-days: 30

  deploy_to_render:
      needs: build_and_test
      if: ${{ github.event_name == 'push' && !contains(join(github.event.commits.*.message, ' '), '#skip')}}
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Create deployment
          uses: JorgeLNJunior/render-deploy@v1.4.4
          with:
            service_id: ${{ secrets.RENDER_SERVICE_ID }}
            api_key: ${{ secrets.RENDER_API_KEY }}
            wait_deploy: true

  notify_success:
      needs: deploy_to_render
      runs-on: ubuntu-latest
      steps:
        - name: Notify Discord Success
          run: |
            curl -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
              "title": "Deployment Success CI-CD_project",
              "description": "New version is LIVE!",
              "url": "https://ci-cd-project-jcv7.onrender.com",
              "color": 65280,
              "fields": [
              {
                "name": "Author",
                "value": "${{ github.actor }}",
                "inline": true
              }
            ]
            }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK }}

  notify_failure:
      needs: deploy_to_render
      runs-on: ubuntu-latest
      if: failure()
      steps:
        - name: Notify Discord Failure
          run: |
            curl -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
              "title": "Build Failed",
              "description": "**Commit:** `${{ github.sha }}`\n**Author:** ${{ github.actor }}\n**Logs:** [View here](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})",
              "color": 16711680
            }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK }}

  tag_release:
    needs: deploy_to_render
    if: |
        github.event_name == 'push' && !
        contains(join(github.event.commits.*.message, ' '), '#skip')
    runs-on: ubuntu-latest
    steps:
       - uses: actions/checkout@v4
         with:
           fetch-depth: 0
       - name: Bump version and push tag
         uses: anothrNick/github-tag-action@1.75.0
         env:
           GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
           DEFAULT_BUMP: patch