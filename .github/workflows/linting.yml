name: Linting

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    types: [opened, synchronize]
    paths:
      - 'frontend/**'
      - 'backend/**'

jobs:
  linting:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json
            frontend/playwright_blogtesting/package-lock.json

      - name: Backend Lint
        run: |
          npm ci
          npm run lint
        working-directory: backend

      - name: Frontend Lint
        run: |
          npm ci
          npm run lint
        working-directory: frontend

      - name: Playwright Lint
        run: |
          npm ci
          npm run lint
        working-directory: frontend/playwright_blogtesting


